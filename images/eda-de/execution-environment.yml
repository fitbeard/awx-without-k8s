---
version: 3
images:
  base_image:
    name: quay.io/rockylinux/rockylinux:9
dependencies:
  python_interpreter:
    package_system: python3.12
    python_path: /usr/bin/python3.12
  ansible_core:
    package_pip: ansible-core>=2.15.0,<2.19.0
  ansible_runner:
    package_pip: ansible-runner==2.4.3
  galaxy: |
    ---
    collections:
      - name: ansible.eda
      - name: community.general
  system: |
    python3.12-devel [platform:rpm compile]
    java-17-openjdk-devel [platform:rpm]
  python: |
    ansible-rulebook
    asyncio
    aiokafka
    aiohttp
    aiosignal
    aiomqtt
additional_build_steps:
  append_base:
    - RUN $PYCMD -m pip install -U pip
  append_final:
    - RUN alternatives --install /usr/bin/python python /usr/bin/python3.12 312
    - RUN useradd runner -u 1000 -g 0
    - RUN chown -R 1000:0 /home/runner/.config

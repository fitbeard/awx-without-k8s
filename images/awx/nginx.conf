#user awx;

worker_processes  1;

pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    sendfile        on;

    upstream uwsgi {
        server 127.0.0.1:8050;
    }

    upstream daphne {
        server 127.0.0.1:8051;
    }

    server {
        listen 8052 default_server;
        server_name _;
        keepalive_timeout 65;

        # Server-level security headers (apply to all responses)
        add_header Strict-Transport-Security max-age=15768000 always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; report-uri /csp-violation/" always;
        add_header X-Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; report-uri /csp-violation/" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # Django-managed static tree (collectstatic output, includes /static/awx/*)
        location /static/ {
            alias /var/lib/awx/public/static/;
        }

        # Vite UI absolute-path asset references (login masthead, About modal, favicon)
        location = /assets/awx-logo.svg { alias /var/lib/awx/public/static/awx/awx-logo.svg; }
        location = /awx-icon.svg        { alias /var/lib/awx/public/static/awx/awx-icon.svg; }
        location = /favicon.ico         { alias /var/lib/awx/public/static/awx/awx-icon.svg; }

        # WebSocket → daphne
        location ~ ^/(websocket/|api/websocket/) {
            proxy_pass http://daphne;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Host              $http_host;
            proxy_redirect off;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Django-owned prefixes — carved out of SPA fallback so Django gets
        # authoritative control over 404s in these namespaces.
        location /api/                { uwsgi_read_timeout 120s; uwsgi_pass uwsgi; include /etc/nginx/uwsgi_params; proxy_set_header X-Forwarded-Port 443; uwsgi_param HTTP_X_FORWARDED_PORT 443; }
        location /sso/                { uwsgi_read_timeout 120s; uwsgi_pass uwsgi; include /etc/nginx/uwsgi_params; proxy_set_header X-Forwarded-Port 443; uwsgi_param HTTP_X_FORWARDED_PORT 443; }
        location /login/              { uwsgi_read_timeout 120s; uwsgi_pass uwsgi; include /etc/nginx/uwsgi_params; proxy_set_header X-Forwarded-Port 443; uwsgi_param HTTP_X_FORWARDED_PORT 443; }
        location /csp-violation/      { uwsgi_pass uwsgi; include /etc/nginx/uwsgi_params; }
        location /migrations_notran/  { uwsgi_pass uwsgi; include /etc/nginx/uwsgi_params; }

        # SPA fallback: try a file on disk, else serve the Vite shell so
        # React Router can handle client-side routes like /templates, /jobs, etc.
        # Without this, a page refresh on any deep-link hits Django which has no
        # URL pattern for SPA routes and returns "Not Found".
        location / {
            root /var/lib/awx/public/static/awx;
            try_files $uri /static/awx/index_awx.html;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Expires "0";
            add_header Pragma "no-cache";
        }
    }
}

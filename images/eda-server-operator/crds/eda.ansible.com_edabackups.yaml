---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edabackups.eda.ansible.com
spec:
  group: eda.ansible.com
  names:
    kind: EDABackup
    listKind: EDABackupList
    plural: edabackups
    singular: edabackup
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        description: Schema validation for the EDABackup CRD
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - deployment_name
            properties:
              deployment_name:
                description: Name of the deployment to be backed up
                type: string
              backup_pvc:
                description: Name of the backup PVC
                type: string
              backup_pvc_namespace:
                description: (Deprecated) Namespace the PVC is in
                type: string
              backup_storage_requirements:
                description: Storage requirements for backup PVC (may be similar to existing postgres PVC backing up from)
                type: string
              backup_resource_requirements:
                description: Resource requirements for the management pod used to create a backup
                properties:
                  requests:
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  limits:
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                type: object
              backup_storage_class:
                description: Storage class to use when creating PVC for backup
                type: string
              create_backup_pvc:
                description: Automatically create the backup PVC if backup_pvc is defined but does not exist
                type: boolean
                default: true
              clean_backup_on_delete:
                description: Flag to indicate if backup should be deleted on PVC if EDABackup object is deleted
                type: boolean
              pg_dump_suffix:
                description: Additional parameters for the pg_dump command
                type: string
              use_db_compression:
                description: Enable compression for database dumps using pg_dump built-in compression.
                type: boolean
                default: true
              postgres_label_selector:
                description: Label selector used to identify postgres pod for backing up data
                type: string
              postgres_image:
                description: Registry path to the PostgreSQL container to use
                type: string
              postgres_image_version:
                description: PostgreSQL container image version to use
                type: string
              no_log:
                description: Configure no_log for no_log tasks
                type: boolean
                default: true
              set_self_labels:
                description: Maintain some of the recommended `app.kubernetes.io/*` labels on the resource (self)
                type: boolean
                default: true
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              conditions:
                description: The resulting conditions when a Service Telemetry is instantiated
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                    ansibleResult:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  type: object
                type: array
              backupDirectory:
                description: Backup directory name on the specified pvc
                type: string
              backupClaim:
                description: Backup persistent volume claim
                type: string

---
- name: Prepare dependencies
  hosts: all
  become: true
  roles:
    - role: docker
      tags:
        - docker
        - base
      when: docker_install | bool
    - role: tls
      tags:
        - always
#      when: awx_node_role_type in ['control', 'hybrid']

- name: Install HAProxy
  hosts: haproxy
  become: true
  roles:
    - role: haproxy
      tags:
        - haproxy

- name: Install Gateway
  hosts: gateway
  become: true
  roles:
    - role: gateway
      tags:
        - gateway

- name: Run Gateway postinstall
  hosts: gateway
  become: true
  tasks:
    - name: Configure gateway proxy resources
      ansible.builtin.import_role:
        name: gateway
        tasks_from: postinstall.yml
  tags:
    - postinstall

- name: Install AWX
  hosts: awx
  become: true
  roles:
    - role: awx
      tags:
        - awx

- name: AWX settings
  hosts: awx
  roles:
    - role: awx_settings
      tags:
        - awx
        - awx_settings

- name: Install EDA
  hosts: eda
  become: true
  roles:
    - role: eda
      tags:
        - eda

- name: Merge components organization to gateway
  hosts: gateway
  become: true
  tasks:
    - name: Migrate component resources
      ansible.builtin.import_role:
        name: gateway
        tasks_from: migrate.yml
  tags:
    - migrate

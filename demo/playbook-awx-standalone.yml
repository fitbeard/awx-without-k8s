---
- name: Prepare dependencies
  hosts: all
  become: true
  roles:
    - role: docker
      tags:
        - docker
        - base
      when: docker_install | bool
    - role: tls
      tags:
        - always
      when: awx_node_role_type in ['control', 'hybrid']

- name: Install HAProxy
  hosts: haproxy
  become: true
  roles:
    - role: haproxy
      tags:
        - haproxy

- name: Install AWX
  hosts: awx
  become: true
  roles:
    - role: awx
      tags:
        - awx

- name: AWX settings
  hosts: awx
  roles:
    - role: awx_settings
      tags:
        - awx
        - awx_settings

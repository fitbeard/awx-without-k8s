{{- if .Values.kubeRbacProxy.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "eda-server-operator.fullname" . }}-proxy-role
  labels:
    {{- include "eda-server-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "eda-server-operator.fullname" . }}-proxy-rolebinding
  labels:
    {{- include "eda-server-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "eda-server-operator.fullname" . }}-proxy-role
subjects:
  - kind: ServiceAccount
    name: {{ include "eda-server-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.kubeRbacProxy.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ap-gateway-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "ap-gateway-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}

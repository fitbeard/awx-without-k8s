{{- $clusterScope := eq .Values.watchNamespace "" -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if $clusterScope }}ClusterRole{{ else }}Role{{ end }}
metadata:
  name: {{ include "mcp-operator.fullname" . }}-manager-role
  labels:
    {{- include "mcp-operator.labels" . | nindent 4 }}
rules:
  ##
  ## Base operator rules — bookkeeping resources the operator creates per CR
  ##
  - apiGroups: ["", rbac.authorization.k8s.io]
    resources:
      - pods
      - services
      - services/finalizers
      - serviceaccounts
      - endpoints
      - persistentvolumeclaims
      - events
      - configmaps
      - secrets
      - roles
      - rolebindings
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps, networking.k8s.io]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
      - ingresses
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    # NOTE: get + update + patch are all required because the operator's
    # roles/common/templates/service_account.yaml.j2 creates a spawned-pod
    # Role with `verbs: [get, update, patch]` for statefulsets/scale —
    # k8s privilege-escalation rules require us to hold what we grant.
    resources: [statefulsets/scale, deployments/scale]
    verbs: [get, patch, update]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    # NOTE: pods/log needs the full verb set (not just create/get) because
    # the spawned-pod Role grants the same — see service_account.yaml.j2.
    resources: [pods/exec, pods/attach, pods/log]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["", batch, extensions]
    resources: [jobs]
    verbs: [create, delete, get, list, patch, update, watch]
  ##
  ## OpenShift Route support (no-op on plain k8s — `route.openshift.io` apigroup
  ## doesn't exist there, but harmless to grant)
  ##
  - apiGroups: [route.openshift.io]
    resources: [routes, routes/custom-host]
    verbs: [create, delete, get, list, patch, update, watch]
  ##
  ## CRD the operator reconciles (mcpconnect.ansible.com/v1alpha1)
  ##
  ## NOTE: deliberately scoped to mcpconnect.ansible.com only.
  ## The operator binary watches aiconnect.ansible.com (chatbot/Lightspeed) too,
  ## but we don't grant RBAC for that apigroup — chatbot CRs cannot be reconciled
  ## against this install. Signals MCP-only intent.
  ##
  - apiGroups: [mcpconnect.ansible.com]
    resources:
      - ansiblemcpconnects
      - ansiblemcpconnects/status
      - ansiblemcpconnects/finalizers
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if $clusterScope }}ClusterRoleBinding{{ else }}RoleBinding{{ end }}
metadata:
  name: {{ include "mcp-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "mcp-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if $clusterScope }}ClusterRole{{ else }}Role{{ end }}
  name: {{ include "mcp-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

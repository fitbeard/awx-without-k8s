---
- name: Import AWX configuration tasks
  ansible.builtin.import_tasks: awx_configure.yml

- name: Destroy Postgres container
  community.docker.docker_compose_v2:
    project_name: postgres
    project_src: "{{ awx_pg_directory }}"
    state: absent
  when:
    - (awx_postgres_configs is changed | bool or awx_pg_tls_crt_result.changed or awx_pg_tls_key_result.changed) and awx_cluster_node_type == 'primary' and not awx_external_database # noqa: yaml[line-length]

- name: Start Postgres containers
  community.docker.docker_compose_v2:
    project_name: postgres
    project_src: "{{ awx_pg_directory }}"
    state: present
  when:
    - awx_cluster_node_type == 'primary' and not awx_external_database

- name: Destroy AWX containers
  community.docker.docker_compose_v2:
    project_name: awx
    project_src: "{{ awx_directory }}"
    state: absent
  when:
    - awx_configs is changed | bool
      or ((awx_postgres_configs is changed | bool or awx_pg_tls_crt_result.changed or awx_pg_tls_key_result.changed)
      and awx_cluster_node_type == 'primary' and not awx_external_database)
      or ((ap_ca_crt_result is defined and ap_ca_crt_result.changed)
      or (ap_custom_ca_crt_result is defined and ap_custom_ca_crt_result.changed))

- name: Remove receptor.conf
  ansible.builtin.file:
    path: "{{ awx_directory }}/receptor/receptor.conf"
    state: absent
  when: awx_configs is changed | bool

- name: Check if AWX task container is running
  community.docker.docker_container_info:
    name: awx-task
  register: awx_task_container_info

- name: Start AWX containers
  community.docker.docker_compose_v2:
    project_name: awx
    project_src: "{{ awx_directory }}"
    renew_anon_volumes: "{{ not awx_task_container_info.exists }}"
    state: present

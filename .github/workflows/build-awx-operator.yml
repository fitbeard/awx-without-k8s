name: build-awx-operator

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Set image tag'
        required: true
        default: '2.6-709'
      awx-tag:
        description: 'Set AWX image tag'
        required: true
        default: '25.0.0'

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Install QEMU static binaries
        uses: docker/setup-qemu-action@v4.1.0

      - name: Configure Buildkit
        uses: docker/setup-buildx-action@v4.1.0

      - name: Checkout project
        uses: actions/checkout@v6

      - name: Authenticate with Quay.io
        uses: docker/login-action@v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build image
        run: |
          cd images/awx-operator && \
          chmod +x build.sh && \
          chmod +x patch.sh && \
          VERSION=${{ github.event.inputs.tag }} DEFAULT_AWX_VERSION=${{ github.event.inputs.awx-tag }} ./build.sh --no-cache --push
